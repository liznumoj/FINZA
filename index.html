<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>FINZA</title>

<!-- Modo app: pantalla completa al agregar a inicio -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FINZA">
<meta name="theme-color" content="#14112B">

<!-- Ícono de Rumi (el archivo icon.png debe estar en la misma carpeta) -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<style>
  html,body{margin:0;padding:0;height:100%;background:#14112B;overflow:hidden;position:fixed;inset:0;width:100%;}
  iframe{border:0;position:absolute;inset:0;width:100%;height:100%;display:block;}
  .load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#9B93C7;font-family:-apple-system,sans-serif;font-size:14px;gap:14px;background:#14112B;
    transition:opacity .4s;z-index:5;}
  .load img{width:90px;height:90px;border-radius:24px;}
  .load.off{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div class="load" id="load"><img src="icon.png" alt="FINZA"><div>Cargando FINZA…</div></div>

<!-- ⚠️ Verifica que esta URL sea la de TU implementación actual -->
<iframe id="app" scrolling="yes"
  src="https://script.google.com/macros/s/AKfycbwIQ0WvkLUNkezYLF1Sdp4injx9ljEXbwcO9MgQjpu0KwZ6CRiRDSitzu8lFsKS93Q/exec"
  allow="clipboard-write; camera"
  onload="document.getElementById('load').classList.add('off')"></iframe>
</body>
</html>
