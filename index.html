<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FINZA">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>FINZA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;color-scheme:dark;background:#14112B;}
:root{
  --abyss:#14112B;--surface:#201B45;--surface2:#2C2660;--line:#3A3470;
  --ink:#F2EEFF;--muted:#9B93C7;
  --gastos:#FF6B5E;--ingresos:#3DD68C;--ahorros:#FFC857;--inversiones:#A78BFA;
  --flame:#FF8A3D;--xp:#7DE2FF;
}
body{color:var(--ink);}
body,button,input,select,textarea{font-family:'Inter',system-ui,sans-serif;}
.finza{
  --abyss:#14112B;--surface:#201B45;--surface2:#2C2660;--line:#3A3470;
  --ink:#F2EEFF;--muted:#9B93C7;
  --gastos:#FF6B5E;--ingresos:#3DD68C;--ahorros:#FFC857;--inversiones:#A78BFA;
  --flame:#FF8A3D;--xp:#7DE2FF;
  min-height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;color:var(--ink);
  background:radial-gradient(120% 80% at 50% -10%,#2A2160 0%,var(--abyss) 55%);
  display:flex;justify-content:center;
}
.shell{width:100%;max-width:460px;padding:calc(14px + env(safe-area-inset-top)) 16px 110px;position:relative;}
.fz-display{font-family:'Fredoka',sans-serif;}
.hero{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:26px;padding:18px;position:relative;overflow:hidden;}
.hero-top{display:flex;align-items:center;gap:14px;}
.ringwrap{position:relative;width:84px;height:84px;flex:none;}
.lvl-badge{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lvl-badge b{font-family:'Fredoka';font-size:24px;line-height:1;}
.lvl-badge span{font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.hero-info{flex:1;min-width:0;}
.hero-info .greet{font-size:13px;color:var(--muted);}
.balance{font-family:'Fredoka';font-size:30px;font-weight:700;line-height:1.05;margin-top:2px;}
.balance small{font-size:14px;color:var(--muted);font-weight:500;}
.chips{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;}
.chip{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--line);padding:5px 9px;border-radius:999px;}
.mascot{width:64px;height:64px;flex:none;animation:bob 3.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 4px 10px;font-weight:600;}
.buckets{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.bucket{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:14px;text-align:left;position:relative;overflow:hidden;cursor:pointer;transition:transform .12s ease;color:var(--ink);}
.bucket:active{transform:scale(.97);}
.bucket .ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:9px;}
.bucket .nm{font-size:12.5px;color:var(--muted);font-weight:600;}
.bucket .amt{font-family:'Fredoka';font-size:20px;font-weight:600;margin-top:1px;}
.bucket .glow{position:absolute;right:-22px;top:-22px;width:70px;height:70px;border-radius:50%;filter:blur(26px);opacity:.5;}
.mission{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:13px 14px;margin-bottom:10px;}
.mission-h{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.mission-h .t{font-weight:600;font-size:14px;}
.mission-h .r{font-size:11px;color:var(--xp);font-weight:700;white-space:nowrap;}
.bar{height:9px;background:rgba(255,255,255,.08);border-radius:999px;margin-top:9px;overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
.mission .sub{font-size:11.5px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}
.row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid rgba(255,255,255,.05);}
.row .av{width:38px;height:38px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px;}
.row .meta{flex:1;min-width:0;}
.row .meta b{font-size:14px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .meta span{font-size:11.5px;color:var(--muted);}
.row .val{font-family:'Fredoka';font-size:15px;font-weight:600;white-space:nowrap;}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px;line-height:1.6;}
.linkbtn{background:none;border:none;color:var(--xp);font-weight:600;font-size:13px;width:100%;padding:12px;cursor:pointer;}
.badges{display:flex;gap:9px;overflow-x:auto;padding:2px;}
.badge{flex:none;width:74px;text-align:center;}
.badge .ic{width:54px;height:54px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--line);background:var(--surface);}
.badge.locked .ic{filter:grayscale(1);opacity:.35;}
.badge .nm{font-size:10px;color:var(--muted);line-height:1.2;}
.fab{position:fixed;bottom:16px;right:16px;z-index:40;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;color:#150f2e;background:linear-gradient(145deg,#9FE9FF,var(--xp));font-size:29px;font-weight:300;box-shadow:0 10px 26px rgba(125,226,255,.4),0 0 0 5px rgba(125,226,255,.12);display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.fab:active{transform:scale(.9);}
.tabbar{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:39;display:flex;gap:4px;background:rgba(24,20,52,.92);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:999px;padding:6px 8px;box-shadow:0 10px 28px rgba(0,0,0,.5);}
.navbtn{flex:none;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:row;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;transition:transform .1s;}
.navbtn:active{transform:scale(.93);}
.navbtn .ni{font-size:17px;filter:grayscale(1);opacity:.6;}
.navbtn .nl{font-size:11.5px;font-weight:600;letter-spacing:.02em;}
.navbtn.on{color:var(--xp);background:rgba(125,226,255,.13);}
.navbtn.on .ni{filter:none;opacity:1;}
.backdrop{position:fixed;inset:0;background:rgba(8,5,22,.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--line);border-radius:28px 28px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.8,.2,1);}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 14px;}
.sheet h3{font-family:'Fredoka';font-size:20px;margin:0 0 4px;}
.sheet p.hint{color:var(--muted);font-size:12.5px;margin:0 0 16px;}
.modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:6px;}
.mode-btn{background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:14px 8px;color:var(--ink);cursor:pointer;text-align:center;transition:transform .1s;}
.mode-btn:active{transform:scale(.95);}
.mode-btn .e{font-size:24px;display:block;margin-bottom:5px;}
.mode-btn .l{font-size:11.5px;font-weight:600;}
.typetabs{display:flex;gap:7px;margin:4px 0 14px;flex-wrap:wrap;}
.tt{flex:1;min-width:0;padding:9px 6px;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;}
.field{margin-bottom:13px;}
.field label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:var(--abyss);border:1px solid var(--line);border-radius:13px;padding:13px 14px;color:var(--ink);font-size:15px;outline:none;color-scheme:dark;}
.field select option{background:#201B45;color:#F2EEFF;}
.field input[type=date]{color-scheme:dark;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--xp);}
.field textarea{resize:none;min-height:74px;}
.amount-in{font-family:'Fredoka';font-size:26px !important;font-weight:600;text-align:center;}
.cta{width:100%;border:none;border-radius:16px;padding:16px;font-size:15.5px;font-weight:700;font-family:'Fredoka';cursor:pointer;color:#150f2e;background:linear-gradient(145deg,#9FE9FF,var(--xp));margin-top:6px;transition:transform .1s;}
.cta:active{transform:scale(.98);}
.cta:disabled{opacity:.5;}
.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);margin-top:9px;}
.drop{border:2px dashed var(--line);border-radius:18px;padding:26px 16px;text-align:center;cursor:pointer;background:var(--abyss);}
.drop .e{font-size:38px;}
.drop .t{font-weight:600;margin-top:8px;font-size:14px;}
.drop .s{color:var(--muted);font-size:12px;margin-top:3px;}
.preview{width:100%;border-radius:16px;margin-bottom:12px;max-height:230px;object-fit:cover;}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--xp);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.processing{text-align:center;color:var(--muted);font-size:13px;padding:8px;}
.micbtn{width:100%;border-radius:16px;border:1px solid var(--line);background:var(--abyss);color:var(--ink);padding:14px;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:12px;}
.micbtn.rec{border-color:var(--gastos);color:var(--gastos);animation:pulse 1.1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.errbox{background:rgba(255,107,94,.12);border:1px solid var(--gastos);color:#FFD9D4;border-radius:13px;padding:11px 13px;font-size:12.5px;margin-bottom:12px;}
.draftcard{background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;}
.draftcard .dh{font-size:12px;color:var(--xp);font-weight:700;margin-bottom:8px;}
.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);z-index:60;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:11px 16px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:pop .3s;}
@keyframes pop{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast .xp{color:var(--xp);font-family:'Fredoka';}
.levelup{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;background:rgba(8,5,22,.82);backdrop-filter:blur(6px);animation:fade .3s;}
.lucard{text-align:center;}
.lucard .big{font-family:'Fredoka';font-size:60px;font-weight:700;background:linear-gradient(120deg,var(--xp),var(--inversiones));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:bob 1.4s ease-in-out infinite;}
.lucard .sm{color:var(--muted);margin-top:6px;}
.confetti-piece{position:fixed;top:-12px;z-index:65;pointer-events:none;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2;}}
.bone{position:fixed;left:50%;bottom:130px;font-size:38px;z-index:64;pointer-events:none;animation:bonefly 1.4s cubic-bezier(.3,.7,.4,1) forwards}
@keyframes bonefly{0%{transform:translate(-50%,20px) rotate(-25deg) scale(.5);opacity:0}15%{opacity:1}78%{opacity:1}100%{transform:translate(-50%,-46vh) rotate(360deg) scale(1.15);opacity:0}}
@keyframes rwiggle{0%,100%{transform:rotate(0) scale(1)}15%{transform:rotate(-10deg) scale(1.08)}30%{transform:rotate(9deg) scale(1.08)}45%{transform:rotate(-6deg)}60%{transform:rotate(5deg)}80%{transform:rotate(-2deg)}}
.rumiwrap{display:flex;flex-direction:column;align-items:center;flex:none;}
.mascotbox{position:relative;display:inline-block;}
.rumibubble{position:relative;background:#322B66;border:1px solid var(--line);border-radius:13px;padding:6px 9px;font-size:10.5px;line-height:1.25;color:var(--ink);max-width:124px;text-align:center;margin-bottom:7px;box-shadow:0 4px 12px rgba(0,0,0,.3);}
.rumibubble:after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid #322B66;}
.center{display:flex;align-items:center;justify-content:center;min-height:60vh;}
</style>
</head>
<body>
<div class="finza"><div class="shell" id="shell"><div class="center"><div class="spinner"></div></div></div></div>
<button class="fab" id="fab" onclick="openMenu()" aria-label="Registrar">+</button>
<nav class="tabbar" id="nav"></nav>
<div id="modal"></div>
<div id="overlays"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwIQ0WvkLUNkezYLF1Sdp4injx9ljEXbwcO9MgQjpu0KwZ6CRiRDSitzu8lFsKS93Q/exec';
(function(){
  if (window.google && google.script && google.script.run) return;
  var FNS=['getData','addMovimiento','updateMovimiento','deleteMovimiento','readReceipt','parseQuick','comprarAccesorio','equiparAccesorio','reclamarReto'];
  function makeRun(){
    var okF=function(){},errF=function(e){console.error(e);};
    var o={};
    o.withSuccessHandler=function(f){okF=f;return o;};
    o.withFailureHandler=function(f){errF=f;return o;};
    FNS.forEach(function(fn){
      o[fn]=function(){
        var args=[].slice.call(arguments);
        fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({api:fn,args:args})})
          .then(function(r){return r.json();})
          .then(function(res){ if(res&&res.error){errF({message:res.error});} else {okF(res?res.result:null);} })
          .catch(function(e){errF({message:'Sin conexión ('+(e&&e.message||e)+')'});});
      };
    });
    return o;
  }
  var base={};
  ['withSuccessHandler','withFailureHandler'].forEach(function(m){ base[m]=function(f){var c=makeRun();return c[m](f);}; });
  FNS.forEach(function(fn){ base[fn]=function(){var c=makeRun();return c[fn].apply(null,arguments);}; });
  window.google={script:{run:base}};
})();

/* ---------- config ---------- */
var TYPES = {
  gasto:    {label:'Gasto',     hex:'#FF6B5E', emoji:'💸', sign:-1},
  ingreso:  {label:'Ingreso',   hex:'#3DD68C', emoji:'💚', sign:1},
  ahorro:   {label:'Ahorro',    hex:'#FFC857', emoji:'🪙', sign:0},
  inversion:{label:'Inversión', hex:'#A78BFA', emoji:'📈', sign:0},
  abono:    {label:'Abono',     hex:'#5EE6C5', emoji:'💳', sign:-1}
};
var ORDER = ['gasto','ingreso','ahorro','inversion'];
var TABS = ['gasto','ingreso','ahorro','inversion','abono'];
var CATS = {
  gasto:['Comida','Transporte','Gasolina','Hogar','Salud','Entretenimiento','Compras','Servicios','Mascota','Otros'],
  ingreso:['Salario','Negocio','Freelance','Regalo','Otros'],
  ahorro:['Fondo emergencia','Meta','General'],
  inversion:['Acciones','Cripto','Negocio','Bienes raíces','Otros']
};
var CAT_EMOJI = {Comida:'🍔',Transporte:'🚌',Gasolina:'⛽',Hogar:'🏠',Salud:'💊',Entretenimiento:'🎬',Compras:'🛍️',Servicios:'📱',Mascota:'🐶',Salario:'💼',Negocio:'🏪',Freelance:'💻',Regalo:'🎁','Fondo emergencia':'🛟',Meta:'🎯',General:'🪙',Acciones:'📊',Cripto:'🪙','Bienes raíces':'🏘️',Otros:'✨'};
var BADGES = {first:{e:'🌱',n:'Primer paso'},photo:{e:'📸',n:'Escáner'},voice:{e:'🎙️',n:'De viva voz'},ten:{e:'🔟',n:'10 registros'},saver:{e:'🏆',n:'$500 ahorrado'},investor:{e:'💎',n:'Inversora'}};
var BADGE_ORDER = ['first','photo','voice','ten','saver','investor'];

/* ---------- state ---------- */
var S = {mov:[], metas:[], cfg:{}, showAll:false, tab:'inicio'};

/* ---------- helpers ---------- */
function money(n){n=Number(n)||0;return (n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function sum(arr,t){return arr.filter(function(x){return x.tipo===t;}).reduce(function(a,x){return a+Number(x.monto||0);},0);}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return (n<10?'0':'')+n;}
function thisMonth(x){var d=new Date();var p=String(x.fecha).split('-');return Number(p[0])===d.getFullYear()&&Number(p[1])===d.getMonth()+1;}
function relDate(iso){var d=new Date(iso+'T00:00:00');var now=new Date();var diff=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate())-new Date(d.getFullYear(),d.getMonth(),d.getDate()))/864e5);if(diff===0)return 'Hoy';if(diff===1)return 'Ayer';if(diff<7)return 'Hace '+diff+' días';return d.toLocaleDateString('es',{day:'numeric',month:'short'});}
function levelFromXP(xp){var lvl=1,need=100,left=xp;while(left>=need){left-=need;lvl++;need=Math.round(need*1.35);}return {lvl:lvl,into:left,need:need};}
function num(v){var n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?'':n;}

/* ---------- boot ---------- */
fitHeight();
google.script.run.withSuccessHandler(boot).withFailureHandler(fatal).getData();
function boot(d){S.mov=d.movimientos||[];S.metas=d.metas||[];S.cfg=d.config||{};S.deudas=d.deudas||[];S.presup=d.presup||{};S.tend=d.tendencia||[];render();}
function fatal(e){document.getElementById('shell').innerHTML='<div class="empty">No pude cargar tus datos.<br>'+esc(e.message)+'</div>';}

/* ---------- render ---------- */
function render(){
  var cfg=S.cfg, xp=Number(cfg.xp)||0, lv=levelFromXP(xp);
  var streak=Number(cfg.streak)||0;
  var logros=(cfg.logros||'').split(',').filter(String);
  var monthMov=S.mov.filter(thisMonth);
  var tot={gasto:sum(monthMov,'gasto'),ingreso:sum(monthMov,'ingreso'),ahorro:sum(S.mov,'ahorro'),inversion:sum(S.mov,'inversion')};
  var gastoEfec=S.mov.filter(function(x){return x.tipo==='gasto'&&(!x.metodo||x.metodo==='efectivo');}).reduce(function(a,x){return a+Number(x.monto||0);},0);
  var bal=sum(S.mov,'ingreso')-gastoEfec-sum(S.mov,'abono')-sum(S.mov,'ahorro')-sum(S.mov,'inversion');
  var hueGanados=hueGanadosTotal();
  var huesitos=Math.max(0,hueGanados-(Number(S.cfg.huesitosGastados)||0));

  var R=37,C=2*Math.PI*R,pct=Math.min(lv.into/lv.need,1);
  var html='';
  html+='<div class="hero"><div class="hero-top">';
  html+='<div class="ringwrap"><svg width="84" height="84" style="transform:rotate(-90deg)">'+
        '<circle cx="42" cy="42" r="'+R+'" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="7"/>'+
        '<circle cx="42" cy="42" r="'+R+'" fill="none" stroke="var(--xp)" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-pct))+'"/></svg>'+
        '<div class="lvl-badge"><span>Nivel</span><b>'+lv.lvl+'</b></div></div>';
  html+='<div class="hero-info"><div class="greet">Hola, '+esc(cfg.nombre||'Liz')+' 👋</div>'+
        '<div class="balance"><small>balance · </small>'+money(bal)+'</div>'+
        '<div class="chips"><span class="chip" style="color:var(--ahorros)">🏅 '+tituloNivel(lv.lvl)+'</span><span class="chip">🔥 '+streak+' <span style="color:var(--muted)">racha</span></span>'+
        '<span class="chip" style="color:var(--xp)">✦ '+lv.into+'/'+lv.need+' XP</span>'+
        '<span class="chip" title="Huesitos de Rumi">🦴 '+huesitos+'</span></div></div>';
  html+='<div class="rumiwrap" onclick="openTienda()" style="cursor:pointer"><div class="rumibubble">'+esc(rumiFrase(bal,streak,tot,huesitos))+'</div><div class="mascotbox">'+mascotSVG(bal<0?'triste':(bal>0?'feliz':'normal'),100)+accesorioHTML()+'</div></div>'+'</div></div>';

  if(S.tab==='inicio'){

  }else{
    var list=(S.showAll||S.q)?fuente:fuente.slice(0,5);

function metaProgress(g,tot,streak){
  if(g.vinculo==='ahorro')return sum(S.mov,'ahorro');
  if(g.vinculo==='inversion_count')return Math.min(S.mov.filter(function(x){return x.tipo==='inversion';}).length,g.objetivo);
  if(g.vinculo==='racha')return Math.min(streak,g.objetivo);
  if(g.vinculo==='ingreso_mes')return tot.ingreso;
  if(g.vinculo==='gasto_mes')return tot.gasto;
  return 0;
}

function rumiFrase(bal,streak,tot,huesitos){
  var hoy=todayISO();
  var hoyMov=S.mov.some(function(x){return x.fecha===hoy;});
  // alerta de presupuesto primero
  if(S.presup){
    var alerta=null;
    Object.keys(S.presup).forEach(function(cat){
      var lim=S.presup[cat];if(!lim)return;
      var gastado=S.mov.filter(function(x){return x.tipo==='gasto'&&x.categoria===cat&&thisMonth(x);}).reduce(function(a,x){return a+Number(x.monto||0);},0);
      if(gastado>=lim)alerta='⚠️ Te pasaste del presupuesto de '+cat;
      else if(!alerta&&gastado>=lim*0.8)alerta='Ojo: vas al '+Math.round(gastado/lim*100)+'% en '+cat;
    });
    if(alerta)return alerta;
  }
  var msgs;
  if(bal<0) msgs=['Cuidado, vamos en rojo 🎲','Frenemos los gastos variables 🐾','Yo creo en ti, ¡a recuperarnos!'];
  else if(streak>=7) msgs=['¡Racha de '+streak+' días! 🔥','Imparable, me tienes orgullosa 🐶'];
  else if(tot.ahorro>0&&tot.ingreso>=tot.gasto) msgs=['¡Vas ahorrando rico! 🦴','Cada huesito cuenta 💛','Así se cuida la platita ✨'];
  else if(!hoyMov) msgs=['¿Registramos algo hoy? 🐾','Cuéntame en qué andas el dinero','Un registro y subimos XP ✦'];
  else if(bal>0) msgs=['Vas muy bien 💚','Equilibrio perfecto, sigue así'];
  else msgs=['¡Hola! Lista para cuidar tus monedas 🐶','Aquí estoy contigo 🐾'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

/* ---------- modal infra ---------- */
function modal(){return document.getElementById('modal');}
function closeSheet(){modal().innerHTML='';}
function openSheet(inner){
  modal().innerHTML='<div class="backdrop" onclick="if(event.target===this)closeSheet()"><div class="sheet"><div class="grab"></div>'+inner+'</div></div>';
}

/* ---------- add menu ---------- */
function openMenu(){
  openSheet('<h3>¿Qué quieres registrar?</h3><p class="hint">Elige la forma más rápida para ti.</p>'+
    '<div class="modes">'+
    '<button class="mode-btn" onclick="openPhoto()"><span class="e">📸</span><span class="l">Foto de factura</span></button>'+
    '<button class="mode-btn" onclick="openQuick()"><span class="e">🎙️</span><span class="l">Voz o texto</span></button>'+
    '<button class="mode-btn" onclick="openManual(\'gasto\')"><span class="e">✍️</span><span class="l">Manual</span></button>'+
    '</div>');
}

/* ---------- photo ---------- */
function openPhoto(){
  openSheet('<h3>📸 Foto de factura</h3><p class="hint">Toma o sube una foto del recibo. Gemini extrae monto, comercio, fecha y categoría.</p>'+
    '<div id="perr"></div>'+
    '<div id="pbody"><div class="drop" onclick="document.getElementById(\'pfile\').click()"><div class="e">🧾</div><div class="t">Tocar para tomar foto</div><div class="s">o subir una imagen del recibo</div></div></div>'+
    '<input id="pfile" type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhotoFile(this.files[0])">'+
    '<button class="cta ghost" onclick="openMenu()">Volver</button>');
}
function onPhotoFile(file){
  if(!file)return;
  document.getElementById('pbody').innerHTML='<div class="spinner"></div><div class="processing">Leyendo la factura…</div>';
  var reader=new FileReader();
  reader.onload=function(){
    var b64=String(reader.result).split(',')[1];
    var mime=file.type||(/\.hei[cf]$/i.test(file.name)?'image/heic':'image/jpeg');
    google.script.run.withSuccessHandler(openDraft)
      .withFailureHandler(function(e){photoErr('No pude leer la factura — '+e.message);})
      .readReceipt(b64,mime);
  };
  reader.onerror=function(){photoErr('No se pudo leer el archivo.');};
  reader.readAsDataURL(file);
}
function photoErr(msg){
  var pe=document.getElementById('perr'); if(pe)pe.innerHTML='<div class="errbox">'+esc(msg)+'</div>';
  var pb=document.getElementById('pbody'); if(pb)pb.innerHTML='<div class="drop" onclick="document.getElementById(\'pfile\').click()"><div class="e">🧾</div><div class="t">Probar otra foto</div><div class="s">o ingrésalo a mano</div></div>';
}

/* ---------- quick (voz/texto) ---------- */
function openQuick(){
  openSheet('<h3>🎙️ Voz o texto</h3><p class="hint">Escríbelo o díctalo natural y la IA lo ordena. Ej: <i>“gasté 45 en gasolina ayer”</i>.</p>'+
    '<div id="qerr"></div>'+
    '<div class="errbox" style="background:rgba(125,226,255,.1);border-color:var(--xp);color:#CFefff">🎤 Para dictar: toca el campo de abajo y usa el <b>micrófono del teclado</b> de tu iPhone.</div>'+
    '<div class="field"><textarea id="qtext" placeholder="gasté 12 en café esta mañana…"></textarea></div>'+
    '<div id="qbody"><button class="cta" onclick="submitQuick()">Interpretar ✦</button></div>'+
    '<button class="cta ghost" onclick="openMenu()">Volver</button>');
  setTimeout(function(){var q=document.getElementById('qtext');if(q)q.focus();},280);
}
function submitQuick(){
  var t=(document.getElementById('qtext')||{}).value||'';
  if(!t.trim()){document.getElementById('qerr').innerHTML='<div class="errbox">Escribe o dicta algo.</div>';return;}
  document.getElementById('qbody').innerHTML='<div class="spinner"></div><div class="processing">Interpretando…</div>';
  google.script.run.withSuccessHandler(openDraft)
    .withFailureHandler(function(e){var qe=document.getElementById('qerr');if(qe)qe.innerHTML='<div class="errbox">No entendí — '+esc(e.message)+'</div>';var qb=document.getElementById('qbody');if(qb)qb.innerHTML='<button class="cta" onclick="submitQuick()">Interpretar ✦</button>';})
    .parseQuick(t);
}

/* ---------- manual / draft confirm ---------- */
function openManual(tipo){openDraft({tipo:tipo,monto:'',categoria:(CATS[tipo]?CATS[tipo][0]:''),desc:'',fecha:todayISO(),origen:'manual'});}
function openAbono(deudaId){
  var dd=null;(S.deudas||[]).forEach(function(x){if(x.id===deudaId)dd=x;});
  openDraft({tipo:'abono',monto:'',categoria:dd?dd.nombre:'',metodo:deudaId,desc:dd?('Abono a '+dd.nombre):'',fecha:todayISO(),origen:'manual'});
}
function openDraft(d){
  d=d||{};var tipo=TYPES[d.tipo]?d.tipo:'gasto';
  var defMetodo=(tipo==='gasto')?(d.metodo||'efectivo'):(tipo==='abono'?(d.metodo||((S.deudas&&S.deudas[0])?S.deudas[0].id:'')):'');
  window._draft={tipo:tipo,monto:d.monto,categoria:d.categoria||(CATS[tipo]?CATS[tipo][0]:''),desc:d.desc||'',fecha:d.fecha||todayISO(),origen:d.origen||'manual',editId:d.editId||null,naturaleza:(tipo==='gasto'?(d.naturaleza||'variable'):''),metodo:defMetodo};
  renderDraft();
}
function openEdit(id){
  var mv=null;for(var i=0;i<S.mov.length;i++){if(String(S.mov[i].id)===String(id)){mv=S.mov[i];break;}}
  if(!mv)return;
  openDraft({editId:id,tipo:mv.tipo,monto:mv.monto,categoria:mv.categoria,desc:mv.desc,fecha:mv.fecha,origen:mv.origen||'manual',naturaleza:mv.naturaleza,metodo:mv.metodo});
}
function deudaNombre(id){var n=id;(S.deudas||[]).forEach(function(x){if(x.id===id)n=x.emoji+' '+x.nombre;});return n;}
function renderDraft(){
  var d=window._draft;var T=TYPES[d.tipo];var auto=(d.origen==='foto'||d.origen==='voz');var edit=!!d.editId;
  var tabs='';TABS.forEach(function(k){var t=TYPES[k];var on=d.tipo===k;
    tabs+='<button class="tt'+(on?' on':'')+'" style="'+(on?'background:'+t.hex+';border-color:'+t.hex+';color:#150f2e':'')+'" onclick="setDraftType(\''+k+'\')">'+t.emoji+' '+t.label+'</button>';});
  var head=(auto&&!edit)?'<div class="draftcard"><div class="dh">'+(d.origen==='foto'?'📸 Leído de la factura':'🎙️ Interpretado de tu nota')+'</div><div style="font-size:13.5px;color:var(--muted)">Confirma que todo esté correcto antes de guardar.</div></div>':'';
  var title=edit?'Editar movimiento':(auto?'Revisa y confirma':'Nuevo movimiento');
  var hint=edit?'Ajusta lo que quieras y guarda.':(auto?'La IA prellenó esto. Ajusta lo que haga falta y guarda.':'Completa los datos.');
  var saveLabel=edit?'Guardar cambios ✦':('Guardar '+T.label.toLowerCase()+' ✦');
  // campo categoría (o deuda si es abono)
  var catField;
  if(d.tipo==='abono'){
    if(!S.deudas||!S.deudas.length){catField='<div class="errbox">Primero registra tus tarjetas/préstamos en la hoja "Deudas".</div>';}
    else{
      var dops='';S.deudas.forEach(function(x){dops+='<option value="'+esc(x.id)+'"'+(x.id===d.metodo?' selected':'')+'>'+esc(x.emoji+' '+x.nombre+' · $'+x.saldo.toFixed(2))+'</option>';});
      catField='<div class="field"><label>¿A qué deuda abonas?</label><select onchange="setDraftDeuda(this.value)">'+dops+'</select></div>';
    }
  }else{
    var cats='';CATS[d.tipo].forEach(function(c){cats+='<option value="'+esc(c)+'"'+(c===d.categoria?' selected':'')+'>'+(CAT_EMOJI[c]||'•')+' '+esc(c)+'</option>';});
    catField='<div class="field"><label>Categoría</label><select id="dcat" onchange="window._draft.categoria=this.value">'+cats+'</select></div>';
  }
  // método de pago para gastos
  var metField='';
  if(d.tipo==='gasto'){
    var mops='<option value="efectivo"'+((!d.metodo||d.metodo==='efectivo')?' selected':'')+'>💵 Efectivo / Débito</option>';
    (S.deudas||[]).forEach(function(x){if(x.tipo!=='tarjeta')return;mops+='<option value="'+esc(x.id)+'"'+(x.id===d.metodo?' selected':'')+'>'+esc(x.emoji+' '+x.nombre)+'</option>';});
    metField='<div class="field"><label>¿Con qué pagaste?</label><select onchange="window._draft.metodo=this.value">'+mops+'</select></div>';
  }
  var natRow = (d.tipo==='gasto') ?
    ('<div class="field"><label>Tipo de gasto</label><div class="typetabs">'+
     '<button class="tt'+(d.naturaleza==='fijo'?' on':'')+'" style="'+(d.naturaleza==='fijo'?'background:#FF6B5E;border-color:#FF6B5E;color:#150f2e':'')+'" onclick="setNat(\'fijo\')">🔁 Fijo</button>'+
     '<button class="tt'+(d.naturaleza!=='fijo'?' on':'')+'" style="'+(d.naturaleza!=='fijo'?'background:#FF6B5E;border-color:#FF6B5E;color:#150f2e':'')+'" onclick="setNat(\'variable\')">🎲 Variable</button>'+
     '</div></div>') : '';
  var delBtn=edit?'<button class="cta ghost" style="color:var(--gastos);border-color:var(--gastos)" onclick="deleteDraft()">🗑️ Eliminar</button>':'';
  var backBtn=edit?'<button class="cta ghost" onclick="closeSheet()">Cancelar</button>':'<button class="cta ghost" onclick="openMenu()">Volver</button>';
  openSheet('<h3>'+title+'</h3><p class="hint">'+hint+'</p>'+
    head+'<div id="derr"></div>'+
    '<div class="typetabs">'+tabs+'</div>'+
    '<div class="field"><label>Monto</label><input id="dmonto" class="amount-in" inputmode="decimal" placeholder="0.00" value="'+esc(d.monto)+'" style="color:'+T.hex+'" oninput="window._draft.monto=this.value"></div>'+
    '<div class="field"><label>Descripción</label><input id="ddesc" placeholder="Ej. Super 99, salario…" value="'+esc(d.desc)+'" oninput="window._draft.desc=this.value"></div>'+
    catField+
    metField+
    natRow+
    '<div class="field"><label>Fecha</label><input id="dfecha" type="date" value="'+esc(d.fecha)+'" onchange="window._draft.fecha=this.value"></div>'+
    '<button class="cta" style="background:linear-gradient(145deg,'+T.hex+','+T.hex+'cc)" onclick="saveDraft()">'+saveLabel+'</button>'+
    delBtn+backBtn);
}
function setDraftDeuda(id){window._draft.metodo=id;var dd=null;(S.deudas||[]).forEach(function(x){if(x.id===id)dd=x;});if(dd){window._draft.categoria=dd.nombre;if(!window._draft.desc||window._draft.desc.indexOf('Abono a ')===0)window._draft.desc='Abono a '+dd.nombre;}renderDraft();}
function setNat(v){window._draft.naturaleza=v;renderDraft();}
function setDraftType(k){window._draft.tipo=k;if(k==='abono'){var d0=(S.deudas&&S.deudas[0])?S.deudas[0]:null;window._draft.metodo=d0?d0.id:'';window._draft.categoria=d0?d0.nombre:'';}else{window._draft.categoria=CATS[k][0];window._draft.metodo=(k==='gasto'?'efectivo':'');}window._draft.naturaleza=(k==='gasto'?(window._draft.naturaleza||'variable'):'');renderDraft();}
function reload(){google.script.run.withSuccessHandler(boot).withFailureHandler(function(e){toast('⚠️ '+e.message);}).getData();}
function saveDraft(){
  var d=window._draft;d.monto=num(d.monto);
  if(!d.monto){document.getElementById('derr').innerHTML='<div class="errbox">Pon un monto mayor a 0.</div>';return;}
  closeSheet();
  if(d.editId){
    google.script.run.withSuccessHandler(function(){reload();toast('✏️ Movimiento actualizado');})
      .withFailureHandler(function(e){toast('⚠️ '+e.message);}).updateMovimiento(d.editId,d);
    return;
  }
  // optimista (nuevo)
  S.mov.unshift({id:'tmp'+Date.now(),fecha:d.fecha,tipo:d.tipo,monto:Number(d.monto),categoria:d.categoria,desc:d.desc,origen:d.origen,naturaleza:d.naturaleza,metodo:d.metodo});
  render();
  google.script.run.withSuccessHandler(function(r){
    var prevStreak=Number(S.cfg.streak)||0;
    S.cfg.xp=r.game.xp;S.cfg.streak=r.game.streak;S.cfg.ultimoDia=r.game.ultimoDia;S.cfg.logros=r.game.logros;
    if(S.mov[0]&&String(S.mov[0].id).indexOf('tmp')===0)S.mov[0].id=r.id;
    // recalcula saldos de deudas localmente
    if(d.metodo&&d.metodo!=='efectivo'&&S.deudas){S.deudas.forEach(function(x){if(x.id!==d.metodo)return;if(d.tipo==='gasto')x.saldo+=Number(d.monto);if(d.tipo==='abono')x.saldo=Math.max(0,x.saldo-Number(d.monto));});}
    render();
    toastXP(r.gained,TYPES[d.tipo].label+' guardado');
    if(d.tipo==='ahorro'||d.tipo==='ingreso'||d.tipo==='abono')celebrateBone();
    if(d.tipo==='abono'&&S.deudas){S.deudas.forEach(function(x){if(x.id===d.metodo&&x.saldo<=0){setTimeout(function(){confetti();cheer('¡'+x.nombre+' saldada! 🎉','Rumi está dando volteretas 🐶');},700);}});}
    var hueNow=hueGanadosTotal();
    var hueAntes=hueNow;
    if(d.tipo==='ahorro'||d.tipo==='abono')hueAntes=hueNow-Math.floor(Number(d.monto));
    if(d.tipo==='ingreso')hueAntes=hueNow-5;
    var streakHit=(r.game.streak!==prevStreak && [7,14,30,60,100,365].indexOf(r.game.streak)>=0);
    var hueUnlock=null;
    Object.keys(HUESITO).forEach(function(k){k=Number(k);if(hueAntes<k&&hueNow>=k)hueUnlock=HUESITO[k];});
    if(r.leveledTo){confetti();cheer('¡Nivel '+r.leveledTo+'!','Sigue registrando para subir más ✦');}
    else if(streakHit){confetti();cheer('¡Racha de '+r.game.streak+' días! 🔥','Rumi está orgullosa de ti 🐶');}
    else if(hueUnlock){setTimeout(function(){confetti();cheer(hueUnlock,'¡Le diste un premio a Rumi! 🦴');},800);}
    else if(r.newBadges&&r.newBadges.length){confetti();}
  }).withFailureHandler(function(e){
    S.mov.shift();render();toast('⚠️ No se guardó: '+e.message);
  }).addMovimiento(d);
}
function deleteDraft(){var d=window._draft;closeSheet();google.script.run.withSuccessHandler(function(){reload();toast('🗑️ Eliminado');}).withFailureHandler(function(e){toast('⚠️ '+e.message);}).deleteMovimiento(d.editId);}

/* ---------- detalle por categoría ---------- */
var PALETTE=['#FF6B5E','#FFC857','#3DD68C','#A78BFA','#7DE2FF','#FF8FB0','#5EE6C5','#FFB14E','#C792EA','#82AAFF'];
function donut(segs){
  var total=segs.reduce(function(a,s){return a+s.value;},0)||1;var R=54,C=2*Math.PI*R,off=0,arcs='';
  segs.forEach(function(s){var f=s.value/total;arcs+='<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="'+s.color+'" stroke-width="20" stroke-dasharray="'+(f*C)+' '+C+'" stroke-dashoffset="'+(-off*C)+'"/>';off+=f;});
  return '<svg width="150" height="150" viewBox="0 0 140 140" style="transform:rotate(-90deg)">'+arcs+'</svg>';
}
function openDetail(tipo){window._detFilt='todos';renderDetail(tipo);}
function setDetFilt(tipo,f){window._detFilt=f;renderDetail(tipo);}
function renderDetail(tipo){
  var T=TYPES[tipo];
  var mensual=(tipo==='gasto'||tipo==='ingreso');
  var base=(mensual?S.mov.filter(thisMonth):S.mov).filter(function(x){return x.tipo===tipo;});
  var filt=window._detFilt||'todos';
  var src=base, filtUI='';
  if(tipo==='gasto'){
    var fij=base.filter(function(x){return x.naturaleza==='fijo';});
    var vari=base.filter(function(x){return x.naturaleza!=='fijo';});
    var sFij=fij.reduce(function(a,x){return a+Number(x.monto||0);},0);
    var sVar=vari.reduce(function(a,x){return a+Number(x.monto||0);},0);
    if(filt==='fijo')src=fij; else if(filt==='variable')src=vari;
    var pill=function(key,label){return '<button class="tt'+(filt===key?' on':'')+'" style="'+(filt===key?'background:#FF6B5E;border-color:#FF6B5E;color:#150f2e':'')+'" onclick="setDetFilt(\'gasto\',\''+key+'\')">'+label+'</button>';};
    filtUI='<div class="typetabs">'+pill('todos','Todos')+pill('fijo','🔁 Fijos')+pill('variable','🎲 Variables')+'</div>'+
      '<div style="display:flex;justify-content:space-between;margin:-4px 2px 12px;font-size:12px;color:var(--muted)"><span>🔁 Fijos: <b style="color:var(--ink)">'+money(sFij)+'</b></span><span>🎲 Variables: <b style="color:var(--ink)">'+money(sVar)+'</b></span></div>';
  }
  var byCat={};src.forEach(function(x){byCat[x.categoria]=(byCat[x.categoria]||0)+Number(x.monto||0);});
  var arr=Object.keys(byCat).map(function(k){return {label:k,value:byCat[k]};}).sort(function(a,b){return b.value-a.value;});
  arr.forEach(function(s,i){s.color=PALETTE[i%PALETTE.length];});
  var total=arr.reduce(function(a,s){return a+s.value;},0);
  var when=mensual?'este mes':'en total';
  var body;
  if(!arr.length){body='<div class="empty">Sin movimientos '+when+'.</div>';}
  else{
    var list='';arr.forEach(function(s){var pct=total?Math.round(s.value/total*100):0;
      var lim=(tipo==='gasto'&&S.presup)?S.presup[s.label]:null;
      var budg='';
      if(lim){var bp=Math.min(s.value/lim,1);var bcol=bp>=1?'#FF6B5E':(bp>=.8?'#FFC857':'#3DD68C');
        budg='<div class="bar" style="height:5px;margin-top:5px"><i style="width:'+(bp*100)+'%;background:'+bcol+'"></i></div>'+
             '<span style="font-size:10.5px;color:'+bcol+'">'+(bp>=1?'⚠️ Presupuesto superado':Math.round(bp*100)+'% de '+money(lim))+'</span>';}
      list+='<div class="row"><div class="av" style="background:'+s.color+'22">'+(CAT_EMOJI[s.label]||'•')+'</div>'+
        '<div class="meta"><b>'+esc(s.label)+'</b><span>'+pct+'%</span>'+budg+'</div>'+
        '<div class="val" style="color:'+s.color+'">'+money(s.value)+'</div></div>';});
    body='<div style="position:relative;text-align:center;margin:4px 0 6px">'+donut(arr)+
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
      '<div style="font-size:11px;color:var(--muted)">'+when+'</div>'+
      '<div class="fz-display" style="font-size:21px;font-weight:600;color:'+T.hex+'">'+money(total)+'</div></div></div>'+list;
  }
  openSheet('<h3>'+T.emoji+' '+T.label+' por categoría</h3><p class="hint">Desglose '+when+'. Toca un movimiento en la pantalla para editarlo.</p>'+
    filtUI+body+
    '<button class="cta" style="background:linear-gradient(145deg,'+T.hex+','+T.hex+'cc)" onclick="openManual(\''+tipo+'\')">+ Agregar '+T.label.toLowerCase()+'</button>'+
    '<button class="cta ghost" onclick="closeSheet()">Cerrar</button>');
}

/* ---------- feedback ---------- */
function toast(msg){var o=document.getElementById('overlays');var el=document.createElement('div');el.className='toast';el.innerHTML=esc(msg);o.appendChild(el);setTimeout(function(){el.remove();},2600);}
function toastXP(xp,label){var o=document.getElementById('overlays');var el=document.createElement('div');el.className='toast';el.innerHTML='✅ '+esc(label)+' <span class="xp">+'+xp+' XP</span>';o.appendChild(el);setTimeout(function(){el.remove();},2400);}
function confetti(){var cols=['#7DE2FF','#FFC857','#A78BFA','#3DD68C','#FF6B5E'];var o=document.getElementById('overlays');for(var i=0;i<46;i++){(function(i){var s=document.createElement('span');s.className='confetti-piece';var sz=6+Math.random()*7;s.style.left=(Math.random()*100)+'%';s.style.width=sz+'px';s.style.height=(sz*1.4)+'px';s.style.background=cols[i%cols.length];s.style.animationDuration=(2+Math.random()*1.6)+'s';s.style.animationDelay=(Math.random()*0.4)+'s';o.appendChild(s);setTimeout(function(){s.remove();},3800);})(i);}}
function cheer(title,sub){var o=document.getElementById('overlays');var el=document.createElement('div');el.className='levelup';el.onclick=function(){el.remove();};el.innerHTML='<div class="lucard">'+mascotSVG('happy',140)+'<div class="big">'+esc(title)+'</div><div class="sm">'+esc(sub)+'</div></div>';o.appendChild(el);}
function levelUp(n){cheer('¡Nivel '+n+'!','Sigue registrando para subir más ✦');}
function celebrateBone(){
  var hero=document.querySelector('.hero .mascot');
  if(hero){ hero.src=RUMI.feliz; hero.style.animation='rwiggle .65s ease-in-out 2'; }
  var b=document.createElement('div'); b.className='bone'; b.textContent='🦴';
  document.getElementById('overlays').appendChild(b);
  setTimeout(function(){ if(b&&b.remove)b.remove(); render(); }, 1500);
}
</script>
